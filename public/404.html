<!DOCTYPE html>
<html>
  <head>
    <script>
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const base = '/Esso-system';
      const redirect = base + '/?p=' + encodeURIComponent(path.replace(base, '') + search) + (hash ? '&hash=' + encodeURIComponent(hash) : '');
      window.location.replace(redirect);
    </script>
  </head>
</html>
